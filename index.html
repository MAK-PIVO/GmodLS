<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <link rel="stylesheet" href="style.css">

    <!-- preload images -->
    <link rel="preload" as="image" href="loadingimage1.png">
    <link rel="preload" as="image" href="loadingimage2.png">
    <link rel="preload" as="image" href="loadingimage3.png">
    <link rel="preload" as="image" href="loadingimage4.png">
    <link rel="preload" as="image" href="loadingimage5.png">
</head>
<body>

<div id="slideshow">
    <img class="slide active" src="loadingimage1.png">
    <img class="slide" src="loadingimage2.png">
    <img class="slide" src="loadingimage3.png">
    <img class="slide" src="loadingimage4.png">
    <img class="slide" src="loadingimage5.png">
</div>

<!-- AUDIO -->
<audio id="bgmusic" autoplay loop>
    <source src="gachi.mp3" type="audio/mpeg">
    <source src="gachi.wav" type="audio/wav">
</audio>

<!-- VOLUME -->
<div id="volumeControl">
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<script src="script.js"></script>

</body>
</html>
